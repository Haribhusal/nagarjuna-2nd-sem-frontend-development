<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form</title>
</head>

<body>

  <form>
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter your name"> <br />
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email"> <br />
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="Enter your password"> <br />

    <p>Select Gender</p>
    <input type="radio" id="maleselector" name="genderselection"> <label for="maleselector">Male</label>
    <input type="radio" id="femaleselector" name="genderselection"><label for="femaleselector">Female</label> <br />
    <hr />

    <p>Which game/s you want to participate in?</p>

    <input type="checkbox" id="f" name="participation"> <label for="f">Football</label>
    <input type="checkbox" id="c" name="participation"> <label for="c">Cricket</label>
    <input type="checkbox" id="b" name="participation"> <label for="b">Basketball</label>
    <input type="checkbox" id="p" name="participation"> <label for="p">Pool</label>

    <hr />

    <label for="">Select Date</label><input type="date"> <br />
    <button type="submit">Submit</button>
  </form>

</body>

</html>
