<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .boxes {
      display: flex;
      height: 300px;
      background-color: red;
      align-items: center;
      /* justify-content: center; */
      /* justify-content: space-between; */
      /* justify-content: space-around; */
      /* justify-content: space-evenly; */
      /* flex-wrap: wrap-reverse; */

    }

    .box {
      height: 100px;
      width: 100px;
      border-radius: 100%;
      background-color: yellow;
      line-height: 100px;
      text-align: center;
    }

    .box:nth-child(1) {
      background-color: white;
      order: 3;
    }

    .box:nth-child(2) {
      background-color: white;
      order: 4;
    }

    .box:nth-child(3) {
      background-color: white;
      order: 1;
    }

    .box:nth-child(4) {
      background-color: white;
      order: 2;
    }

    .box:nth-child(5) {
      background-color: white;
      order: 5;
    }

    .container {
      display: flex;
    }

    .left {
      /* width: 25%; */
      background-color: yellow;
      padding: 30px;
      flex-grow: 2;
    }

    .right {
      /* width: 75%; */
      padding: 30px;
      flex-grow: 3;
      background-color: red;
    }

    .rightmost {
      background-color: blue;
      flex-grow: 1;
    }
  </style>
</head>

<body>

  <!-- <div class="boxes">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>

  </div> -->


  <div class="container">
    <div class="left">this is left</div>
    <div class="right">this is right</div>
    <div class="rightmost"></div>
  </div>

</body>

</html>
